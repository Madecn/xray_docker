name: xray_docker_reality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 */2 * *'  # UTC 20:00  UTC+8 04:00
  push:
    paths:
      - 'reality/Dockerfile'
      - '.github/workflows/xray_docker_reality.yml'
      - 'reality/entrypoint.sh'
      - 'reality/config.json'
      - 'reality/Caddyfile'
      - 'reality/www/**'
      - 'reality/VERSION'
  pull_request:
    paths:
      - 'reality/Dockerfile'
      - '.github/workflows/xray_docker_reality.yml'
      - 'reality/entrypoint.sh'
      - 'reality/config.json'
      - 'reality/Caddyfile'
      - 'reality/www/**'
      - 'reality/VERSION'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Read image version
        shell: bash
        run: |
          VERSION=$(cat reality/VERSION)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Get latest Xray-core version (including pre-release)
        shell: bash
        run: |
          LATEST_VERSION=$(curl -fsSL 'https://api.github.com/repos/XTLS/Xray-core/releases?per_page=1' | jq -er '.[0].tag_name')
          echo "XRAY_VERSION=$LATEST_VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.3.0
        with:
          context: ./reality
          file: ./reality/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          build-args: |
            XRAY_VERSION=${{ env.XRAY_VERSION }}
          tags: |
            wulabing/xray_docker_reality:${{ env.VERSION }}-ubuntu-24.04-xray-${{ env.XRAY_VERSION }}
            wulabing/xray_docker_reality:latest
          push: ${{ github.event_name != 'pull_request' }}
